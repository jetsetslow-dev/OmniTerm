name: Core_Utilities

services:

  dockhand:
    image: fnsys/dockhand:latest
    container_name: dockhand
    restart: unless-stopped
    ports:
      - 3000:3000
    environment:
      - DISABLE_LOCAL_LOGIN=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dockhand_data:/app/data
    networks:
      - home_network

#  portainer:
#    image: portainer/portainer-ee:latest
#    container_name: portainer-ee
#    ports:
#      - 9443:9443
#    volumes:
#        - ${docker_config}/portainer/data:/data
#        - /var/run/docker.sock:/var/run/docker.sock
#    restart: unless-stopped
#    networks:
#      home_network:
#        ipv4_address: 10.6.0.50

  newt:
    image: fosrl/newt
    container_name: newt
    restart: unless-stopped
    environment:
      - PANGOLIN_ENDPOINT=https://app.pangolin.net
      - NEWT_ID=examplenewtid000
      - NEWT_SECRET=examplenewtsecretexamplenewtsecret00000000
      - DOCKER_SOCKET=/var/run/docker.sock # Set environment variable
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro # Mount the socket
    networks:
      home_network:

# portainer_agent:
  #   ports:
  #     - 9001:9001
  #   container_name: portainer_agent
  #   restart: always
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #     - /var/lib/docker/volumes:/var/lib/docker/volumes
  #   image: portainer/agent:latest
  #   networks:
  #     home_network:
  #       ipv4_address: 10.6.0.42

  code-server:
    image: lscr.io/linuxserver/code-server:latest
    container_name: code-server
    environment:
      - PUID=${UID}
      - PGID=${GID}
      - TZ=${TZ}
      - PROXY_DOMAIN=codeserver.jetsetslow.com
      - DEFAULT_WORKSPACE=/data
    volumes:
      - ${docker_config}/vscode/config:/config
      - /home/user/docker:/data
    ports:
      - 8443:8443
    restart: unless-stopped
    networks:
      home_network:
        ipv4_address: 10.6.0.43

  cloudflared_tunnel:
    container_name: cloudflared-tunnel
    image: cloudflare/cloudflared:latest-arm64
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${cloudflared_token}
    volumes:
      - ${docker_config}/cloudflared:/etc/cloudflared
    networks:
      home_network:
        ipv4_address: 10.6.0.44

  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscaled
    privileged: true
    restart: unless-stopped
    volumes:
      - /var/lib:/var/lib
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
      - NET_RAW
    environment:
      - TS_USERSPACE=false
      - TS_EXTRA_ARGS=--accept-routes
      - TS_SOCKET=/var/run/tailscale/tailscaled.sock
      - TS_AUTHKEY=${tskey}
      - TS_HOSTNAME=RPI5
      - TS_ROUTES=192.168.11.0/24,192.168.2.0/24,10.6.0.0/24,10.5.0.0/24
      - TS_STATE_DIR=/var/lib/tailscale
    networks:
      home_network:
        ipv4_address: 10.6.0.45

#  wire-pod:
#    hostname: escapepod
#    image: ghcr.io/kercre123/wire-pod:main
#    container_name: escapepod
#    restart: unless-stopped
#    ports:
#      - 444:443
#      - 8081:8080
#      - 82:80
#      - 8084:8084
#    volumes:
#      - wire-pod-data:/chipper/
#      - wire-pod-model:/vosk/
#    networks:
#      home_network:
#        ipv4_address: 10.6.0.46

  nginx-proxy-manager:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: nginx-proxy-manager
    restart: unless-stopped
    environment:
      PUID: ${UID}
      PGID: ${GID}
    ports:
      - 80:80
      - 81:81
      - 443:443
    healthcheck:
      test: ["CMD", "/usr/bin/check-health"]
      interval: 10s
      timeout: 3s
    volumes:
      - ${docker_config}/npm/data:/data
      - ${docker_config}/npm/letsencrypt:/etc/letsencrypt
    networks:
      home_network:
        ipv4_address: 10.6.0.47

  filebrowser:
    image: filebrowser/filebrowser
    container_name: filebrowser
    user: "${UID}:${GID}"
    ports:
      - 446:8080
    volumes:
      - /home/user/docker:/srv
      - ${docker_config}/filebrowser/config:/config
      - ${docker_config}/filebrowser/filebrowser_database:/database
    environment:
      - FB_BASEURL=filebrowser.jetsetslow.com
    restart: always


