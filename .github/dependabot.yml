version: 2
updates:
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 2
    groups:
      android-dependencies:
        patterns: ["*"]
        update-types: ["minor", "patch"]
      android-major-upgrades:
        patterns: ["*"]
        update-types: ["major"]
    ignore:
      # Pre-release biometric changes need explicit device testing and should not be folded into
      # an automated maintenance bundle.
      - dependency-name: "androidx.biometric:biometric"
        versions: ["*-alpha*", "*-beta*", "*-rc*"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:30"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 1
    groups:
      github-actions:
        patterns: ["*"]
        update-types: ["major", "minor", "patch"]
