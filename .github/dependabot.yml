version: 2
updates:
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 2
    groups:
      android-dependencies:
        patterns: ["*"]
        update-types: ["minor", "patch"]
      android-major-upgrades:
        patterns: ["*"]
        update-types: ["major"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:30"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 1
    groups:
      github-actions:
        patterns: ["*"]
        update-types: ["major", "minor", "patch"]
