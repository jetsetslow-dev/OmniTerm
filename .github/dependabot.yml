version: 2
updates:
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 2
    groups:
      android-dependencies:
        patterns: ["*"]
        update-types: ["minor", "patch"]
      android-major-upgrades:
        patterns: ["*"]
        update-types: ["major"]
    # These releases raise minCompileSdk to 37. Remove the holds when the app adopts SDK 37;
    # until then, Dependabot would repeatedly open grouped PRs that cannot pass AAR metadata.
    ignore:
      - dependency-name: androidx.biometric:biometric
        versions: [">= 1.4.0-alpha06"]
      - dependency-name: androidx.core:core-ktx
        versions: [">= 1.19.0"]
      - dependency-name: androidx.lifecycle:lifecycle-runtime-ktx
        versions: [">= 2.11.0"]
      - dependency-name: androidx.lifecycle:lifecycle-viewmodel-compose
        versions: [">= 2.11.0"]
      - dependency-name: androidx.lifecycle:lifecycle-runtime-compose
        versions: [">= 2.11.0"]
      # Network, SSH, ads, and consent majors have user-visible protocol/policy implications.
      # Keep patch/minor security updates automated; migrate these majors with dedicated server,
      # proxy, SFTP, ad-sandbox, and consent regression coverage instead of a blind grouped bump.
      - dependency-name: com.squareup.retrofit2:retrofit
        update-types: ["version-update:semver-major"]
      - dependency-name: com.squareup.retrofit2:converter-moshi
        update-types: ["version-update:semver-major"]
      - dependency-name: com.squareup.okhttp3:logging-interceptor
        update-types: ["version-update:semver-major"]
      - dependency-name: com.squareup.okhttp3:okhttp
        update-types: ["version-update:semver-major"]
      - dependency-name: com.google.android.gms:play-services-ads
        update-types: ["version-update:semver-major"]
      - dependency-name: com.google.android.ump:user-messaging-platform
        update-types: ["version-update:semver-major"]
      - dependency-name: com.github.mwiede:jsch
        update-types: ["version-update:semver-major"]
      # CodeQL's Kotlin extractor rejects 2.4.10 ("kotlin-version-too-new"), which fails the
      # Analyze Java/Kotlin job that gates auto-prereleases. Unignore once the CodeQL bundle
      # supports the newer Kotlin patch line.
      - dependency-name: org.jetbrains.kotlin.plugin.compose
        versions: [">= 2.4.10, < 2.5.0"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:30"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 1
    groups:
      github-actions:
        patterns: ["*"]
        update-types: ["major", "minor", "patch"]
