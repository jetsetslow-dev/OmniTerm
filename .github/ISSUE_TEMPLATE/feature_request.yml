name: Feature request
description: Propose a focused user-facing improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Describe the workflow or limitation, not just a preferred implementation.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives and competitors
      description: Note current workarounds or how comparable terminal/admin apps handle it.
  - type: textarea
    id: risks
    attributes:
      label: Security, compatibility, and UX considerations
      description: Consider permissions, remote-side effects, secrets, failure recovery, accessibility, and older devices/servers.
