name: Submit dependency graph

env:
  GIT_CONFIG_COUNT: 1
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: main

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dependency-submission-${{ github.ref }}
  cancel-in-progress: true

jobs:
  submit:
    name: Submit Gradle dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: main

      - name: Set up JDK
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          # Report only the dependencies that can ship in a release APK. Resolving every Gradle
          # configuration also publishes build-tool and test-runner internals as if they were app
          # dependencies, producing unactionable alerts for code that is never packaged.
          dependency-graph-include-projects: "^:app$"
          dependency-graph-include-configurations: "^(openSource|playStore)ReleaseRuntimeClasspath$"
          dependency-graph: generate-and-submit
          validate-wrappers: true
