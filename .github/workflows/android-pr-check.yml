name: PR Check

# Commits often land on main directly (not via PR), so run the same build + unit-test suite on
# every push to main too — otherwise the Robolectric cold-start gate only fires at release time.
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

# Cancel in-progress runs for the same PR to save GitHub Actions minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up JDK
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      # assembleDebug needs a keystore to package. Use the real debug keystore from the repo
      # secret when available; fall back to a throwaway one with the same alias/passwords for
      # contexts without secrets (e.g. PRs from forks) — check APKs are build-verification
      # artifacts, never published, so signature continuity doesn't matter here.
      - name: Provide debug keystore
        env:
          ANDROID_DEBUG_KEYSTORE_BASE64: ${{ secrets.ANDROID_DEBUG_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_DEBUG_KEYSTORE_BASE64" ]; then
            printf '%s' "$ANDROID_DEBUG_KEYSTORE_BASE64" | base64 --decode > debug.keystore
          else
            keytool -genkeypair -keystore debug.keystore -storepass android -keypass android \
              -alias androiddebugkey -dname CN=Android-Debug -keyalg RSA -keysize 2048 -validity 10000
          fi

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      # With product flavors there is no "testDebugUnitTest" umbrella task — the per-variant
      # task names must be spelled out.
      - name: Run Unit Tests
        run: ./gradlew testOpenSourceDebugUnitTest testPlayStoreDebugUnitTest --no-daemon
