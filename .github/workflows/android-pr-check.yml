name: PR Check

# actions/checkout initializes a temporary repository; define its branch name so Git does not emit
# the legacy-default-branch warning on every job.
env:
  GIT_CONFIG_COUNT: 1
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: main

# Pull requests own pre-merge unit/lint/migration validation. The aggregate CodeQL workflow owns
# the equivalent main-branch release gate, so running this workflow again after merge only burns a
# second runner without adding a publication precondition.
on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

# Cancel in-progress runs for the same PR to save GitHub Actions minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Detect whether this PR touches anything that can affect the build. Docs, unrelated workflow
  # YAML, and published artifacts cannot change compiled output, so the heavy jobs below skip them.
  # This workflow definition itself is included so changes to the required gate are exercised.
  # Because "Build & Test" and "Validate Room migrations" are REQUIRED checks, each heavy job has a
  # companion no-op job reporting the SAME check name, so a skipped build still satisfies branch
  # protection (a required check that simply doesn't report would leave the PR unmergeable).
  changes:
    name: Detect code changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - id: filter
        # Plain git diff (no third-party action — the repo's Actions policy only allows a specific
        # SHA-pinned set). Positive include-paths: any changed file under these prefixes means a
        # build is required. Anything else (docs, workflow YAML, artifacts) leaves code=false.
        # .github/actions/** is included because the composite setup action affects every build; if
        # git diff fails for any reason we fail safe to code=true (run the full build).
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -uo pipefail
          if ! changed=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" 2>/dev/null); then
            echo "git diff failed; running full build to be safe."
            echo "code=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "Changed files:"; echo "$changed"
          if echo "$changed" | grep -qE '^(app/|gradle/|scripts/|\.github/actions/|\.github/workflows/android-pr-check\.yml$|gradle\.properties|build\.gradle\.kts|settings\.gradle\.kts|gradlew$|gradlew\.bat$)'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-test:
    name: Build & Test
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Android Gradle
        uses: ./.github/actions/setup-android-gradle

      - name: Validate release and CI tooling
        run: |
          ./scripts/test-release-version.sh
          ./scripts/test-ci-gradle-gate.sh

      # Verification APKs never need signing continuity. Always use an ephemeral key so untrusted
      # build/test code cannot access the stable sideload signing key.
      - name: Provide debug keystore
        run: |
          umask 077
          keytool -genkeypair -keystore debug.keystore -storepass android -keypass android \
            -alias androiddebugkey -dname CN=Android-Debug -keyalg RSA -keysize 2048 -validity 1

      # CodeQL already assembles both debug APK flavors on every PR for compiler tracing. Keep one
      # Gradle process here for the complementary unit/lint gate and publish its diagnostic scan.
      - name: Run unit tests and Android lint
        run: >-
          ./gradlew
          testOpenSourceDebugUnitTest testPlayStoreDebugUnitTest
          lintOpenSourceDebug lintPlayStoreDebug
          --no-daemon --no-configuration-cache
          -Domniterm.publishScan=true

      - name: Delete debug keystore
        if: always()
        run: rm -f debug.keystore

  build-and-test-skip:
    # Companion no-op: satisfies the required "Build & Test" check on PRs that change no code.
    name: Build & Test
    needs: changes
    if: needs.changes.outputs.code != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - run: echo "No build-affecting files changed; skipping Build & Test."

  migration-test:
    name: Validate Room migrations
    # CodeQL retains the migration matrix on main. PRs run it only after the cheaper build,
    # dependency-verification, unit-test, and lint gate succeeds, avoiding wasted emulator time.
    needs: [changes, build-and-test]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Android Gradle
        uses: ./.github/actions/setup-android-gradle

      - name: Provide ephemeral debug keystore
        run: |
          umask 077
          keytool -genkeypair -keystore debug.keystore -storepass android -keypass android \
            -alias androiddebugkey -dname CN=Android-Debug -keyalg RSA -keysize 2048 -validity 1

      # KVM is available on most, but not all, standard GitHub-hosted runners. Use it when present;
      # otherwise keep the slower software-emulation fallback instead of failing before tests.
      - name: Enable KVM acceleration
        run: |
          if [ -e /dev/kvm ] && sudo chmod a+rw /dev/kvm && \
             test -r /dev/kvm && test -w /dev/kvm; then
            echo "KVM acceleration enabled"
          else
            echo "KVM is unavailable on this runner; using software emulation"
          fi

      - name: Run exported-schema migration matrix
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2
        with:
          # Room migration correctness is API-independent; API 29 is smaller/faster when a free
          # hosted runner lacks KVM, while still exercising an older supported SQLite platform.
          api-level: 29
          arch: x86_64
          emulator-boot-timeout: 900
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot -no-metrics
          script: >-
            ./gradlew connectedOpenSourceDebugAndroidTest --no-daemon
            -Domniterm.publishScan=true
            -Pandroid.testInstrumentationRunnerArguments.package=com.jetsetslow.omniterm.data

      - name: Delete debug keystore
        if: always()
        run: rm -f debug.keystore

  migration-test-skip:
    # Companion no-op: satisfies the required "Validate Room migrations" check on no-code PRs.
    name: Validate Room migrations
    needs: changes
    if: needs.changes.outputs.code != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - run: echo "No build-affecting files changed; skipping Room migration matrix."
