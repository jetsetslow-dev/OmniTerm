name: Secret scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "41 4 * * 2"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Scan repository history
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out complete history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Reject tracked credential containers
        shell: bash
        run: |
          tracked="$(git ls-files | grep -Ei '(^|/)(google-services\.json|[^/]*(service.account|service-account)[^/]*\.json|[^/]+\.(jks|keystore|p12|pfx|pem)|[^/]*(keystore|private.key|service.account)[^/]*\.(base64|b64))$' || true)"
          if [ -n "$tracked" ]; then
            echo "Credential-like files must never be committed:" >&2
            printf '%s\n' "$tracked" >&2
            exit 1
          fi

      - name: Scan for committed secrets
        # Pin the container by immutable digest and invoke `gitleaks git` ourselves. The action's
        # push-event defaults narrow --log-opts to the pushed range, which is useful for comments
        # but is not a complete-history security gate.
        run: >-
          docker run --rm
          -v "$PWD:/repo" -w /repo
          zricethezav/gitleaks@sha256:e1b35e12a8c6fa8901f060459cfb6b2fc4c484d3afbe3b029733a3bbfab07055
          git --redact --no-banner --no-color /repo
