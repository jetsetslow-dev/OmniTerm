name: Android build & publish

# One workflow for both build types:
#   - Manual "Run workflow": pick build_type = release (default) or debug.
#       release: signed AAB + OpenSource APK, optional GitHub Release + Play upload.
#                release_channel picks whether the GitHub Release is a production release
#                or a prerelease (tag pushes derive it from the tag name instead).
#       debug:   openSource debug APK, creates or updates a PRERELEASE GitHub Release.
#                Debug tags use a "debug-" prefix so they can never fire the automated
#                release trigger below, and the release is always flagged prerelease so
#                a debuggable, unminified APK can't be mistaken for a production build.
#   - Pushing a tag "v*" (automation): always the full signed release path.
on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "What to build"
        required: true
        type: choice
        options: [release, debug]
        default: release
      release_tag:
        description: "GitHub Release tag to create/update (e.g. v0.9.0; debug default: debug-latest)"
        required: false
        type: string
      release_channel:
        description: "GitHub Release type (tag pushes pick automatically: a SemVer pre-release suffix like v1.0.0-Alpha means prerelease)"
        required: true
        type: choice
        options: [prerelease, production]
        default: prerelease
      build_apk:
        description: "Release only: also build the OpenSource APK (takes longer)"
        required: true
        type: boolean
        default: true
      publish_artifacts:
        description: "Publish GitHub Release assets and upload the AAB to Google Play"
        required: true
        type: boolean
        default: true
      version_code:
        description: "Override versionCode (default: 140 + git commit count; needed when Play already has that code)"
        required: false
        type: string
      version_major:
        description: "Major versionName digit"
        required: true
        type: string
        default: "0"
      version_minor:
        description: "Minor versionName digit"
        required: true
        type: string
        default: "9"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build signed AAB and APK
    if: github.event_name == 'push' || inputs.build_type == 'release'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    # Pick the GitHub Environment by whether this is a PRODUCTION release. This is what scopes
    # AdMob test-device IDs: define ADMOB_TEST_DEVICE_IDS only in the `testing` environment, leave
    # it UNSET in `production`. A production build then sees no test-device secret → empty →
    # real ads for everyone, with no "remember to clear it" footgun.
    #   • Manual dispatch: release_channel == 'production'.
    #   • Tag push: a SemVer pre-release suffix (v1.0.0-Alpha, has a '-') means prerelease/testing;
    #     a clean tag (v1.0.0) means production.
    environment: ${{ (github.event_name == 'workflow_dispatch' && !inputs.publish_artifacts) && 'dry-run' || (((github.event_name == 'workflow_dispatch' && inputs.release_channel == 'production') || (startsWith(github.ref, 'refs/tags/') && !contains(github.ref, '-'))) && 'production' || 'testing') }}

    env:
      PUBLISH_EXTERNAL: ${{ github.event_name != 'workflow_dispatch' || inputs.publish_artifacts }}
      VERSION_CODE_FLOOR: "140"
      KEYSTORE_PATH: ${{ github.workspace }}/omniterm-upload-key.jks
      STORE_PASSWORD: ${{ (github.event_name == 'workflow_dispatch' && !inputs.publish_artifacts) && 'android' || secrets.ANDROID_KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ (github.event_name == 'workflow_dispatch' && !inputs.publish_artifacts) && 'androidreleasekey' || secrets.ANDROID_KEY_ALIAS }}
      KEY_PASSWORD: ${{ (github.event_name == 'workflow_dispatch' && !inputs.publish_artifacts) && 'android' || secrets.ANDROID_KEY_PASSWORD }}
      # Real AdMob IDs for the playStore flavor. The build fails at configuration if a
      # playStoreRelease task runs with Google's sample IDs (see app/build.gradle.kts).
      ADMOB_APP_ID: ${{ (github.event_name == 'workflow_dispatch' && !inputs.publish_artifacts) && 'ca-app-pub-0000000000000000~0000000000' || secrets.ADMOB_APP_ID }}
      ADMOB_BANNER_UNIT_ID: ${{ (github.event_name == 'workflow_dispatch' && !inputs.publish_artifacts) && 'ca-app-pub-0000000000000000/0000000000' || secrets.ADMOB_BANNER_UNIT_ID }}
      # Comma-separated AdMob test-device IDs so a test build can serve test ads (a new real unit
      # returns "no fill" for unregistered devices). An environment VARIABLE (not a secret — the ID
      # isn't sensitive): set in the `testing` environment, unset in `production`. Resolved from the
      # selected ENVIRONMENT above, so empty for production → real ads served to everyone.
      ADMOB_TEST_DEVICE_IDS: ${{ vars.ADMOB_TEST_DEVICE_IDS }}

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Android Gradle
        uses: ./.github/actions/setup-android-gradle
        with:
          install-sdk-packages: "true"

      - name: Resolve release label
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          INPUT_VERSION_MAJOR: ${{ inputs.version_major }}
          INPUT_VERSION_MINOR: ${{ inputs.version_minor }}
          INPUT_VERSION_CODE: ${{ inputs.version_code }}
        run: |
          VERSION_MAJOR="${INPUT_VERSION_MAJOR:-0}"
          VERSION_MINOR="${INPUT_VERSION_MINOR:-9}"
          if [ -n "$INPUT_VERSION_CODE" ]; then
            VERSION_CODE_RESOLVED="$INPUT_VERSION_CODE"
          else
            COMMIT_COUNT="$(git rev-list --count HEAD)"
            VERSION_CODE_RESOLVED="$((VERSION_CODE_FLOOR + COMMIT_COUNT))"
          fi
          echo "VERSION_MAJOR=$VERSION_MAJOR" >> "$GITHUB_ENV"
          echo "VERSION_MINOR=$VERSION_MINOR" >> "$GITHUB_ENV"
          echo "VERSION_CODE=$VERSION_CODE_RESOLVED" >> "$GITHUB_ENV"
          echo "VERSION_NAME=$VERSION_MAJOR.$VERSION_MINOR.$VERSION_CODE_RESOLVED" >> "$GITHUB_ENV"
          if [ -n "$INPUT_RELEASE_TAG" ]; then
            echo "RELEASE_LABEL=$INPUT_RELEASE_TAG" >> "$GITHUB_ENV"
          elif [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "RELEASE_LABEL=v$VERSION_MAJOR.$VERSION_MINOR.$VERSION_CODE_RESOLVED" >> "$GITHUB_ENV"
          else
            echo "RELEASE_LABEL=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi

      # Gate the release on the full unit-test suite — including the Robolectric cold-start smoke
      # test (ColdStartRobolectricTest), so a build that crashes on open can never be signed and
      # published. Deliberately runs before any secret is decoded.
      - name: Run unit tests
        run: ./gradlew testOpenSourceDebugUnitTest testPlayStoreDebugUnitTest --no-daemon -Dorg.gradle.jvmargs=-Xmx2g

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$STORE_PASSWORD" || { echo "Missing ANDROID_KEYSTORE_PASSWORD secret"; exit 1; }
          test -n "$KEY_ALIAS" || { echo "Missing ANDROID_KEY_ALIAS secret"; exit 1; }
          test -n "$KEY_PASSWORD" || { echo "Missing ANDROID_KEY_PASSWORD secret"; exit 1; }
          test -n "$ADMOB_APP_ID" || { echo "Missing ADMOB_APP_ID secret (real AdMob app ID for the Play Store build)"; exit 1; }
          test -n "$ADMOB_BANNER_UNIT_ID" || { echo "Missing ADMOB_BANNER_UNIT_ID secret (real AdMob banner unit ID)"; exit 1; }
          if [ "$PUBLISH_EXTERNAL" = "true" ]; then
            test -n "$ANDROID_KEYSTORE_BASE64" || { echo "Missing ANDROID_KEYSTORE_BASE64 secret"; exit 1; }
            printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          else
            keytool -genkeypair -keystore "$KEYSTORE_PATH" -storepass "$STORE_PASSWORD" -keypass "$KEY_PASSWORD" \
              -alias "$KEY_ALIAS" -dname CN=OmniTerm-Dry-Run -keyalg RSA -keysize 2048 -validity 1
          fi

      - name: Build signed release artifacts
        env:
          BUILD_APK: ${{ inputs.build_apk }}
        run: |
          TASKS=":app:bundlePlayStoreRelease"
          if [ "$BUILD_APK" = "true" ] || [ -z "$BUILD_APK" ]; then
            TASKS="$TASKS :app:assembleOpenSourceRelease"
          fi
          ./gradlew $TASKS --no-daemon -Dorg.gradle.jvmargs=-Xmx2g

      # Signing is done; remove the decoded keystore immediately so no later step (artifact
      # upload, third-party actions) can ever see it, even though the runner is ephemeral.
      - name: Delete decoded keystore
        if: always()
        run: rm -f "$KEYSTORE_PATH"

      - name: Collect GitHub Release outputs (APK)
        run: |
          mkdir -p github-artifacts
          if [ -d "app/build/outputs/apk" ]; then
            find app/build/outputs/apk -name "*.apk" -exec cp {} "github-artifacts/OmniTerm-OpenSource-${RELEASE_LABEL}.apk" \;
            if ls github-artifacts/*.apk >/dev/null 2>&1; then
              sha256sum github-artifacts/* > github-artifacts/SHA256SUMS.txt
            fi
          fi

      - name: Collect Play Store output (AAB)
        run: |
          mkdir -p playstore-artifacts
          find app/build/outputs/bundle -name "*.aab" -exec cp {} "playstore-artifacts/OmniTerm-PlayStore-${RELEASE_LABEL}.aab" \;

      # R8 obfuscates release builds, so a production stack trace is undecodable without the
      # per-variant mapping.txt produced by that exact build. Archive it (named by variant +
      # release label) so any crash report from this build can be deobfuscated later with
      # `retrace`. Kept in the private workflow artifact only — never attached to the public
      # GitHub Release, since mappings reveal the obfuscation scheme.
      - name: Collect R8 mapping files
        run: |
          mkdir -p mapping-artifacts
          found=0
          for variant in playStoreRelease openSourceRelease; do
            mapping="app/build/outputs/mapping/$variant/mapping.txt"
            if [ -f "$mapping" ]; then
              cp "$mapping" "mapping-artifacts/mapping-$variant-${RELEASE_LABEL}.txt"
              found=1
            fi
          done
          test "$found" = "1" || { echo "No R8 mapping.txt found — release builds must be minified"; exit 1; }

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: omniterm-android-release
          path: |
            github-artifacts/*
            playstore-artifacts/*
          if-no-files-found: error

      # Separate artifact with long retention: a crash from a shipped build can surface months
      # later, and the mapping is the only thing that makes its trace readable.
      - name: Upload R8 mappings
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: omniterm-r8-mappings-${{ env.RELEASE_LABEL }}
          path: mapping-artifacts/*
          retention-days: 90
          if-no-files-found: error

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_artifacts)
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_CHANNEL: ${{ inputs.release_channel }}
        run: |
          # Manual runs say production/prerelease explicitly; tag pushes have no inputs, so a
          # SemVer pre-release suffix (v1.0.0-Alpha, v2.0.0-rc1) marks the release prerelease.
          case "${RELEASE_CHANNEL:-auto}" in
            production) PRERELEASE=false ;;
            prerelease) PRERELEASE=true ;;
            *) case "$RELEASE_LABEL" in *-*) PRERELEASE=true ;; *) PRERELEASE=false ;; esac ;;
          esac
          if gh release view "$RELEASE_LABEL" >/dev/null 2>&1; then
            gh release upload "$RELEASE_LABEL" github-artifacts/* --clobber
            # `gh release upload` never changes release state, so an earlier run that died
            # between draft creation and publish would otherwise leave the release stuck as
            # an invisible draft forever (this is exactly what happened to v1.0.0-Alpha).
            gh release edit "$RELEASE_LABEL" --draft=false --prerelease=$PRERELEASE
          else
            gh release create "$RELEASE_LABEL" github-artifacts/* \
              --prerelease=$PRERELEASE \
              --title "OmniTerm $RELEASE_LABEL" \
              --notes "Signed Android release build. Download the .apk to install the Open Source version."
          fi

      - name: Prune old GitHub Releases
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_artifacts)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release list --limit 100 --json tagName,createdAt \
            --jq '[.[] | select(.tagName | test("^v[0-9]+\\.[0-9]+\\.[0-9]+($|[-+])"))] | sort_by(.createdAt) | reverse | .[5:] | .[].tagName' |
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            echo "Pruning old release $tag"
            gh release delete "$tag" --yes --cleanup-tag
          done

      - name: Upload to Google Play
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_artifacts)
        uses: r0adkll/upload-google-play@e738b9dd8f2476ea806d921b64aacd24f34515a5 # v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.jetsetslow.omniterm.app
          releaseFiles: playstore-artifacts/*.aab
          track: internal

  debug:
    name: Build and publish debug APK
    if: github.event_name == 'workflow_dispatch' && inputs.build_type == 'debug'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Full history: versionCode is derived from VERSION_CODE_FLOOR + `git rev-list --count HEAD`,
          # and a shallow clone would undercount after the repository move.
          fetch-depth: 0

      - name: Set up Android Gradle
        uses: ./.github/actions/setup-android-gradle
        with:
          install-sdk-packages: "true"

      - name: Resolve release tag
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          # Debug uploads may target an existing release (e.g. v0.9.0) or create their own.
          # When no tag is given, a rolling "debug-latest" prerelease is created/updated.
          echo "RELEASE_TAG=${INPUT_RELEASE_TAG:-debug-latest}" >> "$GITHUB_ENV"

      # Sideloaded debug APKs must keep the same signature across releases so they update in
      # place, so the real debug keystore comes from a secret (it was never committed).
      - name: Decode debug keystore
        env:
          PUBLISH_EXTERNAL: ${{ inputs.publish_artifacts }}
          ANDROID_DEBUG_KEYSTORE_BASE64: ${{ secrets.ANDROID_DEBUG_KEYSTORE_BASE64 }}
        run: |
          if [ "$PUBLISH_EXTERNAL" = "true" ]; then
            test -n "$ANDROID_DEBUG_KEYSTORE_BASE64" || { echo "Missing ANDROID_DEBUG_KEYSTORE_BASE64 secret"; exit 1; }
            printf '%s' "$ANDROID_DEBUG_KEYSTORE_BASE64" | base64 --decode > debug.keystore
          else
            keytool -genkeypair -keystore debug.keystore -storepass android -keypass android \
              -alias androiddebugkey -dname CN=Android-Debug -keyalg RSA -keysize 2048 -validity 1
          fi

      # Same cold-start gate as the release job: sideloaded debug builds must open too.
      - name: Run unit tests
        run: ./gradlew testOpenSourceDebugUnitTest --no-daemon -Dorg.gradle.jvmargs=-Xmx2g

      # Sideloaders get the openSource flavor (no ad SDK / Play Services dependency).
      - name: Build debug APK
        run: ./gradlew :app:assembleOpenSourceDebug --no-daemon -Dorg.gradle.jvmargs=-Xmx2g

      - name: Stage release artifacts
        run: |
          mkdir -p release-artifacts
          APK=app/build/outputs/apk/openSource/debug/app-openSource-debug.apk
          cp "$APK" "release-artifacts/app-debug.apk"
          cp "$APK" "release-artifacts/OmniTerm-${RELEASE_TAG}-debug.apk"
          (cd release-artifacts && sha256sum * > SHA256SUMS.txt)
          ls -la release-artifacts

      - name: Create or update release with debug assets
        if: inputs.publish_artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-artifacts/* --clobber
          else
            # New releases born from a debug build are always prereleases: a debuggable,
            # unminified APK must never present itself as a production download.
            gh release create "$RELEASE_TAG" release-artifacts/* \
              --prerelease \
              --target "$GITHUB_SHA" \
              --title "OmniTerm $RELEASE_TAG (debug build)" \
              --notes "Debug build for testing only — unminified and debuggable. Not a production release."
          fi
