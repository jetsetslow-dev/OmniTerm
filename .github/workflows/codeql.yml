name: CodeQL

env:
  GIT_CONFIG_COUNT: 1
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: main

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "24 3 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze Java/Kotlin
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Android Gradle
        uses: ./.github/actions/setup-android-gradle
        with:
          install-sdk-packages: "true"

      - name: Provide debug keystore
        run: |
          umask 077
          keytool -genkeypair -keystore debug.keystore -storepass android -keypass android \
            -alias androiddebugkey -dname CN=Android-Debug -keyalg RSA -keysize 2048 -validity 1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: java-kotlin
          build-mode: manual
          # setup-gradle already restores the same Gradle dependency graph. CodeQL's additional
          # cache was retaining ~2 GB per key (over 6 GB active) without removing that need.
          dependency-caching: false
          queries: security-extended

      - name: Validate release tooling
        run: ./scripts/test-release-version.sh

      # This workflow is the automatic prerelease gate, so secret-history validation must be part
      # of this same aggregate result rather than a concurrent workflow that could fail later.
      - name: Scan complete history for committed secrets
        run: >-
          docker run --rm
          -v "$PWD:/repo" -w /repo
          zricethezav/gitleaks@sha256:e1b35e12a8c6fa8901f060459cfb6b2fc4c484d3afbe3b029733a3bbfab07055
          git --redact --no-banner --no-color /repo

      # CodeQL needs uncached compiler execution for both variants. On main, add the complete
      # unit/lint release gate to the SAME Gradle invocation instead of configuring the project a
      # second time. PR Check owns those complementary tasks before merge.
      - name: Compile both variants and run the main release gate
        shell: bash
        run: |
          tasks=(
            :app:assembleOpenSourceDebug
            :app:assemblePlayStoreDebug
          )
          if [ "$GITHUB_EVENT_NAME" != "pull_request" ]; then
            tasks+=(
              :app:testOpenSourceDebugUnitTest
              :app:testPlayStoreDebugUnitTest
              :app:lintOpenSourceDebug
              :app:lintPlayStoreDebug
            )
          fi
          ./gradlew "${tasks[@]}" \
            --no-daemon --no-build-cache --no-configuration-cache \
            -Domniterm.publishScan=true

      # Automatic prereleases are gated on this workflow, so migration validation belongs in the
      # same aggregate result on main rather than a concurrent check that could fail after
      # publication. Pull requests already run the identical required emulator gate in PR Check;
      # do not boot two software-emulated API-35 devices for the same unmerged commit.
      - name: Enable KVM acceleration
        if: github.event_name != 'pull_request'
        run: |
          if [ -e /dev/kvm ] && sudo chmod a+rw /dev/kvm && \
             test -r /dev/kvm && test -w /dev/kvm; then
            echo "KVM acceleration enabled"
          else
            echo "KVM is unavailable on this runner; using software emulation"
          fi

      - name: Validate Room migration matrix
        if: github.event_name != 'pull_request'
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2
        with:
          api-level: 29
          arch: x86_64
          emulator-boot-timeout: 900
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot -no-metrics
          script: >-
            ./gradlew connectedOpenSourceDebugAndroidTest --no-daemon
            -Domniterm.publishScan=true
            -Pandroid.testInstrumentationRunnerArguments.package=com.jetsetslow.omniterm.data

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: "/language:java-kotlin"

      - name: Delete debug keystore
        if: always()
        run: rm -f debug.keystore
