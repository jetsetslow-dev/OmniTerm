name: Set up Android Gradle
description: Install the shared JDK, Gradle, and optional Android SDK packages for CI builds.

inputs:
  install-sdk-packages:
    description: Install Android SDK packages needed by release and CodeQL builds.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Set up JDK
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
      with:
        distribution: temurin
        java-version: "17"

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

    - name: Install Android SDK packages
      if: inputs.install-sdk-packages == 'true'
      shell: bash
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses >/dev/null || true
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"
