<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OmniTerm</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0b0d10;
      color: #e6e6e6;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      text-align: center;
      padding: 24px;
    }
    .card { max-width: 560px; }
    h1 { font-size: 1.6rem; margin: 0 0 0.4em; letter-spacing: 0.04em; }
    p { line-height: 1.6; color: #9aa4af; }
    a { color: #5c82ff; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>OmniTerm</h1>
    <p>
      A privacy-first SSH/SFTP terminal console for Android. Talks directly to your
      hosts; keeps keys and credentials on-device with no telemetry.
    </p>
    <p>
      <a href="https://github.com/jetsetslow-dev/OmniTerm">Source on GitHub</a> &middot;
      <a href="https://github.com/jetsetslow-dev/OmniTerm/blob/main/PRIVACY.md">Privacy Policy</a>
    </p>
  </div>
</body>
</html>
